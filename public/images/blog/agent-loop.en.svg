<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 480" role="img" aria-label="The agent loop">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0d0b16"/><stop offset="1" stop-color="#181329"/>
    </linearGradient>
    <linearGradient id="ac" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#a78bfa"/><stop offset="1" stop-color="#ffffff"/>
    </linearGradient>
    <marker id="av" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0 0 L9 4.5 L0 9 z" fill="#a78bfa"/>
    </marker>
    <marker id="ag" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0 0 L9 4.5 L0 9 z" fill="#34d399"/>
    </marker>
  </defs>
  <style>
    .st { transform-box: fill-box; transform-origin: center; animation: cycle 6s ease-in-out infinite; }
    .s2 { animation-delay: 1.5s } .s3 { animation-delay: 3s } .s4 { animation-delay: 4.5s }
    .wire { stroke-dasharray: 5 8; animation: flow 1.6s linear infinite; }
    .spark { animation: blink 1.4s ease-in-out infinite; }
    @keyframes cycle { 0%,100% { opacity:.55; transform: scale(1) } 12% { opacity:1; transform: scale(1.05) } 30% { opacity:.8; transform: scale(1) } }
    @keyframes flow { to { stroke-dashoffset: -52 } }
    @keyframes blink { 0%,100% { opacity:.3 } 50% { opacity:1 } }
  </style>

  <rect width="1000" height="480" fill="url(#bg)"/>
  <text x="40" y="46" font-family="Georgia, serif" font-size="28" fill="#ece7fb">An agent is a model inside a loop</text>
  <text x="40" y="72" font-family="ui-monospace, monospace" font-size="13" fill="#8a7fb0">it doesn't answer once: it decides, acts, observes and decides again</text>

  <rect x="40" y="200" width="150" height="80" rx="14" fill="none" stroke="#453768" stroke-width="2"/>
  <text x="115" y="234" text-anchor="middle" font-family="ui-monospace, monospace" font-size="12" fill="#a78bfa">GOAL</text>
  <text x="115" y="258" text-anchor="middle" font-family="ui-monospace, monospace" font-size="10" fill="#8a7fb0">"fix the bug"</text>
  <line x1="196" y1="240" x2="248" y2="240" class="wire" stroke="#a78bfa" stroke-width="2" marker-end="url(#av)"/>

  <g class="st">
    <rect x="256" y="118" width="190" height="86" rx="14" fill="none" stroke="url(#ac)" stroke-width="2.5"/>
    <text x="351" y="150" text-anchor="middle" font-family="ui-monospace, monospace" font-size="12" fill="#ece7fb">1 · DECIDE</text>
    <text x="351" y="174" text-anchor="middle" font-family="ui-monospace, monospace" font-size="10" fill="#8a7fb0">what do I do now?</text>
    <text x="351" y="190" text-anchor="middle" font-family="ui-monospace, monospace" font-size="10" fill="#8a7fb0">it picks a tool</text>
  </g>
  <path d="M452 161 h96" class="wire" stroke="#a78bfa" stroke-width="2" fill="none" marker-end="url(#av)"/>

  <g class="st s2">
    <rect x="556" y="118" width="190" height="86" rx="14" fill="none" stroke="#453768" stroke-width="2"/>
    <text x="651" y="150" text-anchor="middle" font-family="ui-monospace, monospace" font-size="12" fill="#ece7fb">2 · ACT</text>
    <text x="651" y="174" text-anchor="middle" font-family="ui-monospace, monospace" font-size="10" fill="#8a7fb0">read · write · run</text>
    <text x="651" y="190" text-anchor="middle" font-family="ui-monospace, monospace" font-size="10" fill="#8a7fb0">query the database</text>
  </g>
  <path d="M752 161 h60 v100 h-60" class="wire" stroke="#a78bfa" stroke-width="2" fill="none" marker-end="url(#av)"/>

  <g class="st s3">
    <rect x="556" y="228" width="190" height="86" rx="14" fill="none" stroke="#453768" stroke-width="2"/>
    <text x="651" y="260" text-anchor="middle" font-family="ui-monospace, monospace" font-size="12" fill="#ece7fb">3 · OBSERVE</text>
    <text x="651" y="284" text-anchor="middle" font-family="ui-monospace, monospace" font-size="10" fill="#8a7fb0">test failed · file not</text>
    <text x="651" y="300" text-anchor="middle" font-family="ui-monospace, monospace" font-size="10" fill="#8a7fb0">found · exit code 0</text>
  </g>
  <path d="M552 271 h-96" class="wire" stroke="#a78bfa" stroke-width="2" fill="none" marker-end="url(#av)"/>

  <g class="st s4">
    <rect x="256" y="228" width="190" height="86" rx="14" fill="none" stroke="#453768" stroke-width="2"/>
    <text x="351" y="260" text-anchor="middle" font-family="ui-monospace, monospace" font-size="12" fill="#ece7fb">4 · ADJUST</text>
    <text x="351" y="284" text-anchor="middle" font-family="ui-monospace, monospace" font-size="10" fill="#8a7fb0">correct course with</text>
    <text x="351" y="300" text-anchor="middle" font-family="ui-monospace, monospace" font-size="10" fill="#8a7fb0">what it just saw</text>
  </g>
  <path d="M252 271 h-30 v-110 h30" class="wire" stroke="#a78bfa" stroke-width="2" fill="none" marker-end="url(#av)"/>
  <text x="140" y="330" font-family="ui-monospace, monospace" font-size="11" fill="#8a7fb0">and starts again…</text>

  <g class="spark">
    <rect x="800" y="150" width="160" height="130" rx="12" fill="none" stroke="#453768" stroke-width="1.5"/>
    <text x="880" y="178" text-anchor="middle" font-family="ui-monospace, monospace" font-size="11" fill="#a78bfa">TOOLS</text>
    <text x="820" y="204" font-family="ui-monospace, monospace" font-size="10" fill="#8a7fb0">📁 files</text>
    <text x="820" y="226" font-family="ui-monospace, monospace" font-size="10" fill="#8a7fb0">⚡ terminal</text>
    <text x="820" y="248" font-family="ui-monospace, monospace" font-size="10" fill="#8a7fb0">🔌 MCP · database</text>
    <text x="820" y="270" font-family="ui-monospace, monospace" font-size="10" fill="#8a7fb0">🌐 web</text>
  </g>

  <rect x="256" y="356" width="490" height="60" rx="12" fill="none" stroke="#34d399" stroke-width="2"/>
  <text x="501" y="382" text-anchor="middle" font-family="ui-monospace, monospace" font-size="12" fill="#34d399">✓ STOPS when the goal is met… or when a limit stops it</text>
  <text x="501" y="404" text-anchor="middle" font-family="ui-monospace, monospace" font-size="10" fill="#8a7fb0">without a stopping condition, an agent loops forever</text>
  <line x1="501" y1="320" x2="501" y2="350" class="wire" stroke="#34d399" stroke-width="2" marker-end="url(#ag)"/>
</svg>

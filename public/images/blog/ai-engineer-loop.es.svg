<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 460" role="img" aria-label="El bucle de trabajo del ingeniero de IA">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0d0b16"/><stop offset="1" stop-color="#181329"/>
    </linearGradient>
    <marker id="av" markerWidth="10" markerHeight="10" refX="8.4" refY="5" orient="auto">
      <path d="M0 0.6 L9.4 5 L0 9.4 z" fill="#a78bfa"/>
    </marker>
    <marker id="ag" markerWidth="10" markerHeight="10" refX="8.4" refY="5" orient="auto">
      <path d="M0 0.6 L9.4 5 L0 9.4 z" fill="#34d399"/>
    </marker>
  </defs>
  <style>
    .flow { stroke-dasharray: 7 7; animation: dash 1.8s linear infinite; }
    .n1 { animation: pl 4.8s ease-in-out infinite; }
    .n2 { animation: pl 4.8s ease-in-out infinite .8s; }
    .n3 { animation: pl 4.8s ease-in-out infinite 1.6s; }
    .n4 { animation: pl 4.8s ease-in-out infinite 2.4s; }
    .n5 { animation: pl 4.8s ease-in-out infinite 3.2s; }
    .n6 { animation: pl 4.8s ease-in-out infinite 4s; }
    .glow { animation: gw 3s ease-in-out infinite; }
    @keyframes dash { to { stroke-dashoffset: -28; } }
    @keyframes pl { 0%,100% { opacity:.7; } 50% { opacity:1; } }
    @keyframes gw { 0%,100% { opacity:.78;} 50% { opacity:1;} }
  </style>

  <rect width="1000" height="460" fill="url(#bg)"/>
  <text x="34" y="38" font-family="Georgia, serif" font-size="25" fill="#ece7fb">El proceso real: dos puertas y un bucle</text>
  <text x="34" y="62" font-family="ui-monospace, monospace" font-size="12" fill="#8a7fb0">la evaluación va delante del producto — y producción devuelve casos a la evaluación</text>

  <!-- puertas previas -->
  <rect x="30" y="150" width="262" height="68" rx="11" fill="none" stroke="#fb7185" stroke-width="2.2" stroke-dasharray="7 5"/>
  <text x="46" y="180" font-family="ui-monospace, monospace" font-size="12.5" fill="#fb7185">1 · ¿esto necesita IA?</text>
  <text x="46" y="202" font-family="ui-monospace, monospace" font-size="10" fill="#8a7fb0">si una regla lo resuelve, no metas IA</text>

  <rect x="30" y="248" width="262" height="68" rx="11" fill="none" stroke="#a78bfa" stroke-width="2.2"/>
  <text x="46" y="278" font-family="ui-monospace, monospace" font-size="12.5" fill="#a78bfa">2 · qué significa «bien»</text>
  <text x="46" y="300" font-family="ui-monospace, monospace" font-size="10" fill="#8a7fb0">si no lo escribes, no lo construyes</text>

  <path class="flow" d="M292 232 C 312 232, 308 166, 322 166" fill="none" stroke="#a78bfa" stroke-width="2.2" marker-end="url(#av)"/>

  <!-- fila superior: 3 → 4 → 5 -->
  <g class="n1">
    <rect x="330" y="130" width="190" height="72" rx="11" fill="#100d1c" stroke="#34d399" stroke-width="2.6"/>
    <text x="425" y="162" text-anchor="middle" font-family="ui-monospace, monospace" font-size="12.5" fill="#34d399">3 · evaluación</text>
    <text x="425" y="184" text-anchor="middle" font-family="ui-monospace, monospace" font-size="9.5" fill="#8a7fb0">casos reales + resultado</text>
  </g>
  <line class="flow" x1="522" y1="166" x2="546" y2="166" stroke="#a78bfa" stroke-width="2.2" marker-end="url(#av)"/>
  <g class="n2">
    <rect x="552" y="130" width="190" height="72" rx="11" fill="#100d1c" stroke="#a78bfa" stroke-width="2.2"/>
    <text x="647" y="162" text-anchor="middle" font-family="ui-monospace, monospace" font-size="12.5" fill="#ece7fb">4 · lo más simple</text>
    <text x="647" y="184" text-anchor="middle" font-family="ui-monospace, monospace" font-size="9.5" fill="#8a7fb0">un modelo, un encargo</text>
  </g>
  <line class="flow" x1="744" y1="166" x2="768" y2="166" stroke="#a78bfa" stroke-width="2.2" marker-end="url(#av)"/>
  <g class="n3">
    <rect x="774" y="130" width="190" height="72" rx="11" fill="#100d1c" stroke="#a78bfa" stroke-width="2.2"/>
    <text x="869" y="162" text-anchor="middle" font-family="ui-monospace, monospace" font-size="12.5" fill="#ece7fb">5 · contexto</text>
    <text x="869" y="184" text-anchor="middle" font-family="ui-monospace, monospace" font-size="9.5" fill="#8a7fb0">tus datos, tus documentos</text>
  </g>

  <!-- bajada derecha -->
  <line class="flow" x1="869" y1="204" x2="869" y2="244" stroke="#a78bfa" stroke-width="2.2" marker-end="url(#av)"/>

  <!-- fila inferior: 6 → 7 → 8 -->
  <g class="n4">
    <rect x="774" y="252" width="190" height="72" rx="11" fill="#100d1c" stroke="#a78bfa" stroke-width="2.2"/>
    <text x="869" y="284" text-anchor="middle" font-family="ui-monospace, monospace" font-size="12.5" fill="#ece7fb">6 · herramientas</text>
    <text x="869" y="306" text-anchor="middle" font-family="ui-monospace, monospace" font-size="9.5" fill="#8a7fb0">solo si el problema lo pide</text>
  </g>
  <line class="flow" x1="770" y1="288" x2="746" y2="288" stroke="#a78bfa" stroke-width="2.2" marker-end="url(#av)"/>
  <g class="n5">
    <rect x="552" y="252" width="190" height="72" rx="11" fill="#100d1c" stroke="#a78bfa" stroke-width="2.2"/>
    <text x="647" y="284" text-anchor="middle" font-family="ui-monospace, monospace" font-size="12.5" fill="#ece7fb">7 · límites</text>
    <text x="647" y="306" text-anchor="middle" font-family="ui-monospace, monospace" font-size="9.5" fill="#8a7fb0">qué no responde, qué gasta</text>
  </g>
  <line class="flow" x1="548" y1="288" x2="524" y2="288" stroke="#a78bfa" stroke-width="2.2" marker-end="url(#av)"/>
  <g class="n6">
    <rect x="330" y="252" width="190" height="72" rx="11" fill="#100d1c" stroke="#34d399" stroke-width="2.6"/>
    <text x="425" y="284" text-anchor="middle" font-family="ui-monospace, monospace" font-size="12.5" fill="#34d399">8 · producción</text>
    <text x="425" y="306" text-anchor="middle" font-family="ui-monospace, monospace" font-size="9.5" fill="#8a7fb0">los fallos vuelven al paso 3</text>
  </g>

  <!-- retorno: 8 vuelve a 3 -->
  <line class="flow" x1="425" y1="250" x2="425" y2="208" stroke="#34d399" stroke-width="2.6" marker-end="url(#ag)"/>
  <text x="437" y="234" font-family="ui-monospace, monospace" font-size="9.5" fill="#34d399">el bucle no se cierra nunca</text>

  <text class="glow" x="500" y="386" text-anchor="middle" font-family="Georgia, serif" font-size="17" fill="#ece7fb" font-style="italic">Sin el paso 3 no hay ingeniería: hay una demo que tuvo suerte.</text>
  <text x="500" y="416" text-anchor="middle" font-family="ui-monospace, monospace" font-size="11" fill="#8a7fb0">las dos puertas de la izquierda se cruzan una sola vez; los seis pasos de la derecha, siempre</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 470" role="img" aria-label="Classic architecture versus one with a model inside: the same input gives the same output, or two different ones">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0d0b16"/><stop offset="1" stop-color="#181329"/>
    </linearGradient>
    <marker id="ag" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0 0 L9 4.5 L0 9 z" fill="#34d399"/></marker>
    <marker id="av" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0 0 L9 4.5 L0 9 z" fill="#a78bfa"/></marker>
    <marker id="ar" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0 0 L9 4.5 L0 9 z" fill="#fb7185"/></marker>
  </defs>
  <style>
    .flow { stroke-dasharray: 5 6; animation: dash 1.7s linear infinite; }
    .flow2 { stroke-dasharray: 5 6; animation: dash 1.7s linear infinite; animation-delay: .5s; }
    .pulse { animation: pulse 3.6s ease-in-out infinite; transform-box: fill-box; transform-origin: center; }
    @keyframes dash { to { stroke-dashoffset: -44; } }
    @keyframes pulse { 0%,100% { opacity: .78; } 50% { opacity: 1; } }
  </style>

  <rect width="1000" height="470" fill="url(#bg)"/>
  <text x="40" y="46" font-family="Georgia, serif" font-size="29" fill="#ece7fb">Same input, same output?</text>
  <text x="40" y="74" font-family="ui-monospace, monospace" font-size="14" fill="#8a7fb0">What changes when you put a model where code used to be</text>

  <line x1="500" y1="100" x2="500" y2="440" stroke="#453768" stroke-width="1" stroke-dasharray="3 5"/>

  <!-- LEFT: classic -->
  <text x="60" y="128" font-family="ui-monospace, monospace" font-size="15" fill="#34d399">Classic · deterministic</text>
  <rect x="60" y="150" width="120" height="46" rx="9" fill="none" stroke="#8a7fb0" stroke-width="1.6"/>
  <text x="120" y="178" text-anchor="middle" font-family="ui-monospace, monospace" font-size="13" fill="#ece7fb">2 + 2</text>
  <rect x="60" y="238" width="120" height="46" rx="9" fill="none" stroke="#8a7fb0" stroke-width="1.6"/>
  <text x="120" y="266" text-anchor="middle" font-family="ui-monospace, monospace" font-size="13" fill="#ece7fb">2 + 2</text>

  <rect x="250" y="180" width="120" height="72" rx="11" fill="none" stroke="#34d399" stroke-width="2.2" class="pulse"/>
  <text x="310" y="212" text-anchor="middle" font-family="ui-monospace, monospace" font-size="13" fill="#34d399">code</text>
  <text x="310" y="232" text-anchor="middle" font-family="ui-monospace, monospace" font-size="10" fill="#8a7fb0">one fixed rule</text>

  <path d="M180 173 C 215 173, 220 205, 248 210" class="flow" stroke="#34d399" stroke-width="2" fill="none" marker-end="url(#ag)"/>
  <path d="M180 261 C 215 261, 220 228, 248 222" class="flow2" stroke="#34d399" stroke-width="2" fill="none" marker-end="url(#ag)"/>

  <rect x="410" y="192" width="60" height="48" rx="9" fill="none" stroke="#34d399" stroke-width="2"/>
  <text x="440" y="222" text-anchor="middle" font-family="ui-monospace, monospace" font-size="16" fill="#34d399">4</text>
  <path d="M370 216 H 408" class="flow" stroke="#34d399" stroke-width="2" fill="none" marker-end="url(#ag)"/>
  <text x="310" y="330" text-anchor="middle" font-family="ui-monospace, monospace" font-size="11" fill="#8a7fb0">Predictable. Testable with</text>
  <text x="310" y="350" text-anchor="middle" font-family="ui-monospace, monospace" font-size="11" fill="#8a7fb0">a test that checks equality.</text>

  <!-- RIGHT: with model -->
  <text x="540" y="128" font-family="ui-monospace, monospace" font-size="15" fill="#a78bfa">With AI · probabilistic</text>
  <rect x="540" y="194" width="120" height="46" rx="9" fill="none" stroke="#8a7fb0" stroke-width="1.6"/>
  <text x="600" y="222" text-anchor="middle" font-family="ui-monospace, monospace" font-size="12" fill="#ece7fb">"summarize this"</text>

  <rect x="710" y="192" width="120" height="50" rx="11" fill="none" stroke="#a78bfa" stroke-width="2.2" class="pulse"/>
  <text x="770" y="214" text-anchor="middle" font-family="ui-monospace, monospace" font-size="13" fill="#a78bfa">model</text>
  <text x="770" y="232" text-anchor="middle" font-family="ui-monospace, monospace" font-size="10" fill="#8a7fb0">picks among many</text>

  <path d="M660 217 H 708" class="flow" stroke="#a78bfa" stroke-width="2" fill="none" marker-end="url(#av)"/>

  <rect x="870" y="150" width="100" height="42" rx="9" fill="none" stroke="#34d399" stroke-width="2"/>
  <text x="920" y="176" text-anchor="middle" font-family="ui-monospace, monospace" font-size="11" fill="#34d399">good output</text>
  <rect x="870" y="246" width="100" height="42" rx="9" fill="none" stroke="#fb7185" stroke-width="2"/>
  <text x="920" y="272" text-anchor="middle" font-family="ui-monospace, monospace" font-size="11" fill="#fb7185">weak output</text>

  <path d="M830 205 C 850 190, 855 178, 868 172" class="flow" stroke="#34d399" stroke-width="2" fill="none" marker-end="url(#ag)"/>
  <path d="M830 230 C 850 248, 855 260, 868 266" class="flow2" stroke="#fb7185" stroke-width="2" fill="none" marker-end="url(#ar)"/>

  <text x="755" y="330" text-anchor="middle" font-family="ui-monospace, monospace" font-size="11" fill="#8a7fb0">The same question can give two answers.</text>
  <text x="755" y="350" text-anchor="middle" font-family="ui-monospace, monospace" font-size="11" fill="#8a7fb0">That's why it needs limits, a stop, and review.</text>

  <rect x="60" y="392" width="880" height="52" rx="10" fill="#a78bfa" fill-opacity="0.08" stroke="#453768" stroke-width="1"/>
  <text x="500" y="416" text-anchor="middle" font-family="ui-monospace, monospace" font-size="12.5" fill="#ece7fb">All AI engineering starts here: if the output isn't fixed, you must bound it, verify it,</text>
  <text x="500" y="434" text-anchor="middle" font-family="ui-monospace, monospace" font-size="12.5" fill="#ece7fb">and decide how much freedom the model gets. That decision IS the architecture.</text>
</svg>

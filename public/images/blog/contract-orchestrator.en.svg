<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 520" role="img" aria-label="An orchestrator: one story, one contract and its consumers (today backend and frontend). No lane asks anything of another lane: everything goes back to the contract, through a person. A third consumer is shown dashed: it's another role with the same configuration.">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0d0b16"/><stop offset="1" stop-color="#181329"/>
    </linearGradient>
    <linearGradient id="ac" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#a78bfa"/><stop offset="1" stop-color="#ffffff"/>
    </linearGradient>
    <marker id="arrow" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0 0 L9 4.5 L0 9 z" fill="#a78bfa"/>
    </marker>
    <marker id="arrowD" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0 0 L9 4.5 L0 9 z" fill="#8a7fb0"/>
    </marker>
    <marker id="arrowR" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0 0 L9 4.5 L0 9 z" fill="#fb7185"/>
    </marker>
  </defs>
  <style>
    .step { animation: pop 6s ease-in-out infinite; transform-box: fill-box; transform-origin: center; }
    .s2 { animation-delay: .5s; } .s3 { animation-delay: 1s; } .s4 { animation-delay: 1.6s; } .s5 { animation-delay: 2.2s; }
    .flow { stroke-dasharray: 6 8; animation: dash 1.6s linear infinite; }
    .flow-slow { stroke-dasharray: 6 8; animation: dash 2.6s linear infinite; }
    .back { stroke-dasharray: 5 7; animation: dashback 2.2s linear infinite; }
    .hub { animation: spin 14s linear infinite; transform-box: fill-box; transform-origin: center; }
    .ghost { animation: breathe 5s ease-in-out infinite; }
    .nope { animation: blink 4s ease-in-out infinite; }
    @keyframes pop { 0%, 100% { opacity: .78; transform: translateY(0); } 8% { opacity: 1; transform: translateY(-4px); } 20% { opacity: .95; } }
    @keyframes dash { to { stroke-dashoffset: -56; } }
    @keyframes dashback { to { stroke-dashoffset: 48; } }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes breathe { 0%, 100% { opacity: .3; } 50% { opacity: .65; } }
    @keyframes blink { 0%, 100% { opacity: .45; } 50% { opacity: 1; } }
  </style>

  <rect width="1000" height="520" fill="url(#bg)"/>
  <text x="40" y="50" font-family="Georgia, serif" font-size="29" fill="#ece7fb">An orchestrator: one contract, every consumer there is</text>
  <text x="40" y="78" font-family="ui-monospace, monospace" font-size="14" fill="#8a7fb0">no lane asks anything of another lane: everything goes back to the contract</text>

  <!-- 1. Story -->
  <g class="step">
    <rect x="40" y="160" width="140" height="110" rx="14" fill="none" stroke="#453768" stroke-width="2"/>
    <text x="110" y="198" text-anchor="middle" font-size="26">📄</text>
    <text x="110" y="228" text-anchor="middle" font-family="ui-monospace, monospace" font-size="13" fill="#ece7fb">1 story</text>
    <text x="110" y="248" text-anchor="middle" font-family="ui-monospace, monospace" font-size="10" fill="#8a7fb0">Jira · Azure · pasted</text>
  </g>
  <line x1="186" y1="215" x2="234" y2="215" class="flow" stroke="#a78bfa" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- 2. Orchestrator -->
  <g class="step s2">
    <rect x="240" y="140" width="170" height="150" rx="14" fill="none" stroke="url(#ac)" stroke-width="2.5"/>
    <g class="hub">
      <circle cx="325" cy="186" r="15" fill="none" stroke="#a78bfa" stroke-width="1.5" stroke-dasharray="4 6"/>
      <circle cx="325" cy="171" r="3" fill="#a78bfa"/>
    </g>
    <text x="325" y="224" text-anchor="middle" font-family="ui-monospace, monospace" font-size="13" fill="#a78bfa">orchestrator</text>
    <text x="325" y="246" text-anchor="middle" font-family="ui-monospace, monospace" font-size="10" fill="#8a7fb0">writes no code</text>
    <text x="325" y="264" text-anchor="middle" font-family="ui-monospace, monospace" font-size="10" fill="#8a7fb0">hands out · shares · joins</text>
  </g>
  <line x1="416" y1="215" x2="464" y2="215" class="flow" stroke="#a78bfa" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- 3. Contract -->
  <g class="step s3">
    <rect x="470" y="155" width="180" height="120" rx="14" fill="none" stroke="url(#ac)" stroke-width="2.5"/>
    <text x="560" y="182" text-anchor="middle" font-family="ui-monospace, monospace" font-size="9" fill="#8a7fb0">specs/004-login/</text>
    <text x="560" y="200" text-anchor="middle" font-family="ui-monospace, monospace" font-size="13" fill="#a78bfa">contracts/api.md</text>
    <text x="560" y="224" text-anchor="middle" font-family="ui-monospace, monospace" font-size="11" fill="#ece7fb">R1 · R2 · R3…</text>
    <text x="560" y="244" text-anchor="middle" font-family="ui-monospace, monospace" font-size="10" fill="#8a7fb0">endpoints · models · auth</text>
    <text x="560" y="264" text-anchor="middle" font-family="ui-monospace, monospace" font-size="10" fill="#8a7fb0">one copy in each repo</text>
  </g>

  <!-- split: one bus out of the contract, the R# originate here -->
  <path d="M650 215 H 690" class="flow" stroke="#a78bfa" stroke-width="2" fill="none"/>
  <path d="M690 135 V 350" stroke="#453768" stroke-width="2" fill="none"/>
  <path d="M690 135 H 722" class="flow" stroke="#a78bfa" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <path d="M690 250 H 722" class="flow-slow" stroke="#a78bfa" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <path d="M690 350 H 722" class="flow-slow ghost" stroke="#8a7fb0" stroke-width="1.5" fill="none" marker-end="url(#arrowD)"/>
  <text x="694" y="128" font-family="ui-monospace, monospace" font-size="9" fill="#a78bfa">1st</text>
  <text x="694" y="243" font-family="ui-monospace, monospace" font-size="9" fill="#8a7fb0">2nd</text>

  <!-- 4. Backend -->
  <g class="step s4">
    <rect x="730" y="95" width="230" height="80" rx="14" fill="none" stroke="#34d399" stroke-width="2"/>
    <text x="845" y="124" text-anchor="middle" font-family="ui-monospace, monospace" font-size="13" fill="#34d399">BACKEND · owner</text>
    <text x="845" y="148" text-anchor="middle" font-family="ui-monospace, monospace" font-size="11" fill="#ece7fb">specs/004-login/</text>
    <text x="845" y="166" text-anchor="middle" font-family="ui-monospace, monospace" font-size="9" fill="#8a7fb0">exposes the API · test first</text>
  </g>

  <!-- ✕ the lanes do NOT talk to each other -->
  <g class="nope">
    <line x1="792" y1="185" x2="804" y2="197" stroke="#fb7185" stroke-width="2"/>
    <line x1="804" y1="185" x2="792" y2="197" stroke="#fb7185" stroke-width="2"/>
    <text x="814" y="196" font-family="ui-monospace, monospace" font-size="10" fill="#fb7185">they never ask each other</text>
  </g>

  <!-- 5. Frontend -->
  <g class="step s5">
    <rect x="730" y="210" width="230" height="80" rx="14" fill="none" stroke="#453768" stroke-width="2"/>
    <text x="845" y="239" text-anchor="middle" font-family="ui-monospace, monospace" font-size="13" fill="#a78bfa">FRONTEND · consumer</text>
    <text x="845" y="263" text-anchor="middle" font-family="ui-monospace, monospace" font-size="11" fill="#ece7fb">specs/004-login/</text>
    <text x="845" y="281" text-anchor="middle" font-family="ui-monospace, monospace" font-size="9" fill="#8a7fb0">same slug · same R#</text>
  </g>

  <!-- 6. Ghost consumer -->
  <g class="ghost">
    <rect x="730" y="315" width="230" height="70" rx="14" fill="none" stroke="#8a7fb0" stroke-width="1.5" stroke-dasharray="7 6"/>
    <text x="845" y="341" text-anchor="middle" font-family="ui-monospace, monospace" font-size="12" fill="#8a7fb0">mobile · admin · partner…</text>
    <text x="845" y="360" text-anchor="middle" font-family="ui-monospace, monospace" font-size="10" fill="#ece7fb">same slug · same R#</text>
    <text x="845" y="378" text-anchor="middle" font-family="ui-monospace, monospace" font-size="9" fill="#8a7fb0">another role, same configuration</text>
  </g>

  <!-- 7. The way back: need something? you don't ask the other lane -->
  <path d="M960 250 H 978 V 440 H 884" class="back" stroke="#fb7185" stroke-width="2" fill="none" marker-end="url(#arrowR)"/>
  <text x="974" y="306" text-anchor="end" font-family="ui-monospace, monospace" font-size="10" fill="#fb7185">missing a field?</text>
  <text x="974" y="406" text-anchor="end" font-family="ui-monospace, monospace" font-size="10" fill="#fb7185">[NEEDS CLARIFICATION]</text>

  <!-- you decide: the loop goes through a person -->
  <g class="step s5">
    <rect x="700" y="415" width="180" height="50" rx="12" fill="none" stroke="#fb7185" stroke-width="2"/>
    <text x="790" y="437" text-anchor="middle" font-family="ui-monospace, monospace" font-size="12" fill="#ece7fb">👤 you decide</text>
    <text x="790" y="455" text-anchor="middle" font-family="ui-monospace, monospace" font-size="9" fill="#8a7fb0">nobody guesses for you</text>
  </g>

  <path d="M700 440 H 530 V 283" class="back" stroke="#fb7185" stroke-width="2" fill="none" marker-end="url(#arrowR)"/>
  <text x="524" y="420" text-anchor="end" font-family="ui-monospace, monospace" font-size="10" fill="#ece7fb">new contract → new fingerprint</text>
  <text x="524" y="436" text-anchor="end" font-family="ui-monospace, monospace" font-size="9" fill="#8a7fb0">stale specs get flagged</text>
  <text x="524" y="452" text-anchor="end" font-family="ui-monospace, monospace" font-size="9" fill="#8a7fb0">and get regenerated in sync</text>
</svg>

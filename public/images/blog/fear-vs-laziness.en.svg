<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 460" role="img" aria-label="Fear and laziness lead to the same place">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0d0b16"/><stop offset="1" stop-color="#181329"/>
    </linearGradient>
    <linearGradient id="ac" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#a78bfa"/><stop offset="1" stop-color="#ffffff"/>
    </linearGradient>
    <marker id="abad" markerWidth="8" markerHeight="8" refX="6.2" refY="4" orient="auto">
      <path d="M0 0 L8 4 L0 8 z" fill="#fb7185"/>
    </marker>
    <marker id="aok" markerWidth="8" markerHeight="8" refX="6.2" refY="4" orient="auto">
      <path d="M0 0 L8 4 L0 8 z" fill="#a78bfa"/>
    </marker>
  </defs>
  <style>
    .flow { stroke-dasharray: 6 8; animation: dash 1.6s linear infinite; }
    .slow { stroke-dasharray: 6 10; animation: dash 2.8s linear infinite; }
    .pulse { animation: pl 2.4s ease-in-out infinite; transform-box: fill-box; transform-origin: center; }
    .pulse2 { animation: pl 2.4s ease-in-out infinite .8s; transform-box: fill-box; transform-origin: center; }
    .glow { animation: gw 3s ease-in-out infinite; }
    @keyframes dash { to { stroke-dashoffset: -56; } }
    @keyframes pl { 0%,100% { opacity:.55; transform:scale(.94);} 50% { opacity:1; transform:scale(1.08);} }
    @keyframes gw { 0%,100% { opacity:.8;} 50% { opacity:1;} }
  </style>

  <rect width="1000" height="460" fill="url(#bg)"/>
  <text x="40" y="42" font-family="Georgia, serif" font-size="27" fill="#ece7fb">Fear and laziness: two roads, one dead end</text>
  <text x="40" y="68" font-family="ui-monospace, monospace" font-size="13.5" fill="#8a7fb0">the two most common reactions to AI — and what they have in common</text>

  <!-- origin -->
  <rect x="40" y="190" width="150" height="88" rx="12" fill="none" stroke="url(#ac)" stroke-width="2.4"/>
  <text x="115" y="228" text-anchor="middle" font-family="ui-monospace, monospace" font-size="16" fill="#a78bfa">AI shows up</text>
  <text x="115" y="252" text-anchor="middle" font-family="ui-monospace, monospace" font-size="11" fill="#8a7fb0">at your job</text>

  <!-- branches -->
  <path class="slow" d="M196 214 C 250 214, 250 140, 300 140" fill="none" stroke="#fb7185" stroke-width="2" marker-end="url(#abad)"/>
  <path class="slow" d="M196 254 C 250 254, 250 330, 300 330" fill="none" stroke="#fb7185" stroke-width="2" marker-end="url(#abad)"/>

  <!-- fear branch -->
  <rect class="pulse" x="308" y="102" width="256" height="78" rx="12" fill="none" stroke="#fb7185" stroke-width="2.2" stroke-dasharray="7 5"/>
  <text x="330" y="134" font-family="ui-monospace, monospace" font-size="15" fill="#fb7185">FEAR</text>
  <text x="330" y="158" font-family="ui-monospace, monospace" font-size="11.5" fill="#ece7fb">"if I use it, I'm expendable" → avoid</text>
  <line x1="570" y1="141" x2="624" y2="180" class="slow" stroke="#fb7185" stroke-width="2" marker-end="url(#abad)"/>

  <!-- laziness branch -->
  <rect class="pulse2" x="308" y="292" width="256" height="78" rx="12" fill="none" stroke="#fb7185" stroke-width="2.2" stroke-dasharray="7 5"/>
  <text x="330" y="324" font-family="ui-monospace, monospace" font-size="15" fill="#fb7185">LAZINESS</text>
  <text x="330" y="348" font-family="ui-monospace, monospace" font-size="11.5" fill="#ece7fb">"it thinks for me" → paste unread</text>
  <line x1="570" y1="331" x2="624" y2="292" class="slow" stroke="#fb7185" stroke-width="2" marker-end="url(#abad)"/>

  <!-- shared destination -->
  <rect x="630" y="188" width="330" height="96" rx="12" fill="none" stroke="#fb7185" stroke-width="2.6"/>
  <text x="795" y="224" text-anchor="middle" font-family="ui-monospace, monospace" font-size="16" fill="#fb7185">you don't understand the tool</text>
  <text x="795" y="250" text-anchor="middle" font-family="ui-monospace, monospace" font-size="11.5" fill="#8a7fb0">you know neither its strengths nor its failures</text>
  <text x="795" y="270" text-anchor="middle" font-family="ui-monospace, monospace" font-size="11.5" fill="#8a7fb0">and you can't answer for the result</text>

  <text class="glow" x="500" y="416" text-anchor="middle" font-family="Georgia, serif" font-size="16.5" fill="#ece7fb" font-style="italic">The way out isn't using it more or less: it's learning to steer it and check it.</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 520" role="img" aria-label="Qué modelo hace cada rol">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0d0b16"/><stop offset="1" stop-color="#181329"/>
    </linearGradient>
    <linearGradient id="ac" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#a78bfa"/><stop offset="1" stop-color="#ffffff"/>
    </linearGradient>
    <marker id="av" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0 0 L9 4.5 L0 9 z" fill="#a78bfa"/>
    </marker>
  </defs>
  <style>
    .card { transform-box: fill-box; transform-origin: center; animation: breathe 4.5s ease-in-out infinite; }
    .c2 { animation-delay: 1.5s } .c3 { animation-delay: 3s }
    .wire { stroke-dasharray: 5 8; animation: flow 1.7s linear infinite; }
    .bar { transform-box: fill-box; transform-origin: left center; animation: grow 2.6s ease-out forwards; }
    .local { animation: pulse 2s ease-in-out infinite; }
    @keyframes breathe { 0%,100% { opacity:.85; transform: translateY(0) } 50% { opacity:1; transform: translateY(-5px) } }
    @keyframes flow { to { stroke-dashoffset: -52 } }
    @keyframes grow { from { transform: scaleX(0) } to { transform: scaleX(1) } }
    @keyframes pulse { 0%,100% { opacity:.5 } 50% { opacity:1 } }
  </style>

  <rect width="1000" height="520" fill="url(#bg)"/>
  <text x="40" y="46" font-family="Georgia, serif" font-size="27" fill="#ece7fb">Un modelo distinto para cada rol</text>
  <text x="40" y="72" font-family="ui-monospace, monospace" font-size="13" fill="#8a7fb0">el caro piensa una vez · el gratis ejecuta muchas · otro revisa</text>

  <!-- LÍDER -->
  <g class="card">
    <rect x="40" y="110" width="290" height="180" rx="16" fill="none" stroke="url(#ac)" stroke-width="2.5"/>
    <text x="62" y="146" font-size="20">🧠</text>
    <text x="94" y="148" font-family="ui-monospace, monospace" font-size="13" fill="#a78bfa">LÍDER · planifica</text>
    <rect x="62" y="164" width="200" height="28" rx="8" fill="none" stroke="#a78bfa" stroke-width="1.5"/>
    <text x="76" y="183" font-family="ui-monospace, monospace" font-size="12" fill="#ece7fb">Claude Opus 4.8</text>
    <text x="62" y="216" font-family="ui-monospace, monospace" font-size="10" fill="#8a7fb0">☁ nube · potente · caro</text>
    <text x="62" y="238" font-family="ui-monospace, monospace" font-size="10" fill="#ece7fb">1 sola llamada por tarea</text>
    <text x="62" y="260" font-family="ui-monospace, monospace" font-size="10" fill="#8a7fb0">ve TODO: spec, reglas,</text>
    <text x="62" y="276" font-family="ui-monospace, monospace" font-size="10" fill="#8a7fb0">arquitectura → escribe el plan</text>
  </g>
  <line x1="336" y1="200" x2="374" y2="200" class="wire" stroke="#a78bfa" stroke-width="2" marker-end="url(#av)"/>

  <!-- DESARROLLADOR -->
  <g class="card c2">
    <rect x="380" y="110" width="290" height="180" rx="16" fill="none" stroke="#34d399" stroke-width="2.5"/>
    <text x="402" y="146" font-size="20">⚙️</text>
    <text x="434" y="148" font-family="ui-monospace, monospace" font-size="13" fill="#34d399">DEVELOPER · ejecuta</text>
    <rect x="402" y="164" width="240" height="28" rx="8" fill="none" stroke="#34d399" stroke-width="1.5"/>
    <text x="416" y="183" font-family="ui-monospace, monospace" font-size="12" fill="#ece7fb">Ollama · qwen3-coder:30b</text>
    <text class="local" x="402" y="216" font-family="ui-monospace, monospace" font-size="10" fill="#34d399">💻 local · en mi máquina · $0</text>
    <text x="402" y="238" font-family="ui-monospace, monospace" font-size="10" fill="#ece7fb">N llamadas: el 90% del trabajo</text>
    <text x="402" y="260" font-family="ui-monospace, monospace" font-size="10" fill="#8a7fb0">ve solo SU tarea: archivo</text>
    <text x="402" y="276" font-family="ui-monospace, monospace" font-size="10" fill="#8a7fb0">exacto y criterio de aceptación</text>
  </g>
  <line x1="676" y1="200" x2="714" y2="200" class="wire" stroke="#a78bfa" stroke-width="2" marker-end="url(#av)"/>

  <!-- REVISOR -->
  <g class="card c3">
    <rect x="720" y="110" width="240" height="180" rx="16" fill="none" stroke="url(#ac)" stroke-width="2.5"/>
    <text x="742" y="146" font-size="20">🔍</text>
    <text x="774" y="148" font-family="ui-monospace, monospace" font-size="13" fill="#a78bfa">REVISOR · juzga</text>
    <rect x="742" y="164" width="150" height="28" rx="8" fill="none" stroke="#a78bfa" stroke-width="1.5"/>
    <text x="756" y="183" font-family="ui-monospace, monospace" font-size="12" fill="#ece7fb">GPT-5.5</text>
    <text x="742" y="216" font-family="ui-monospace, monospace" font-size="10" fill="#8a7fb0">☁ nube · centavos</text>
    <text x="742" y="238" font-family="ui-monospace, monospace" font-size="10" fill="#ece7fb">OTRO modelo, a propósito</text>
    <text x="742" y="260" font-family="ui-monospace, monospace" font-size="10" fill="#8a7fb0">compara el diff contra</text>
    <text x="742" y="276" font-family="ui-monospace, monospace" font-size="10" fill="#8a7fb0">la spec: ¿cumple R1, R2?</text>
  </g>

  <!-- dónde se van los tokens -->
  <text x="40" y="344" font-family="ui-monospace, monospace" font-size="12" fill="#a78bfa">DÓNDE SE VAN LOS TOKENS</text>
  <text x="40" y="366" font-family="ui-monospace, monospace" font-size="10" fill="#8a7fb0">medido en mis propias sesiones: la mayoría no se gastan pensando, se gastan ejecutando</text>

  <text x="40" y="404" font-family="ui-monospace, monospace" font-size="10" fill="#ece7fb">planificar</text>
  <rect x="150" y="392" width="70" height="16" rx="4" fill="#a78bfa" class="bar"/>
  <text x="232" y="404" font-family="ui-monospace, monospace" font-size="10" fill="#8a7fb0">modelo caro — poco volumen</text>

  <text x="40" y="438" font-family="ui-monospace, monospace" font-size="10" fill="#ece7fb">ejecutar</text>
  <rect x="150" y="426" width="620" height="16" rx="4" fill="#34d399" class="bar"/>
  <text x="782" y="438" font-family="ui-monospace, monospace" font-size="10" fill="#34d399">modelo local — $0</text>

  <text x="40" y="472" font-family="ui-monospace, monospace" font-size="10" fill="#ece7fb">revisar</text>
  <rect x="150" y="460" width="120" height="16" rx="4" fill="#a78bfa" class="bar" opacity="0.7"/>
  <text x="282" y="472" font-family="ui-monospace, monospace" font-size="10" fill="#8a7fb0">otro modelo — centavos</text>

  <text x="40" y="504" font-family="Georgia, serif" font-size="16" fill="#ece7fb" font-style="italic">Los modelos pequeños no necesitan ser más listos: necesitan órdenes más claras.</text>
</svg>

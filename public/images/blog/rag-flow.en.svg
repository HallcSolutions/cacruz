<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 480" role="img" aria-label="How RAG works: the question searches an external memory, and the model answers from those documents and cites the source">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0d0b16"/><stop offset="1" stop-color="#181329"/>
    </linearGradient>
    <marker id="av" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0 0 L9 4.5 L0 9 z" fill="#a78bfa"/></marker>
    <marker id="ag" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0 0 L9 4.5 L0 9 z" fill="#34d399"/></marker>
  </defs>
  <style>
    .flow { stroke-dasharray: 5 6; animation: dash 1.7s linear infinite; }
    .doc { animation: bob 5s ease-in-out infinite; transform-box: fill-box; transform-origin: center; }
    .d2 { animation-delay: .5s; } .d3 { animation-delay: 1s; }
    .pulse { animation: pulse 3.4s ease-in-out infinite; transform-box: fill-box; transform-origin: center; }
    @keyframes dash { to { stroke-dashoffset: -44; } }
    @keyframes bob { 0%,100% { opacity: .8; } 50% { opacity: 1; } }
    @keyframes pulse { 0%,100% { opacity: .8; } 50% { opacity: 1; } }
  </style>

  <rect width="1000" height="480" fill="url(#bg)"/>
  <text x="40" y="46" font-family="Georgia, serif" font-size="29" fill="#ece7fb">RAG: two memories instead of one</text>
  <text x="40" y="74" font-family="ui-monospace, monospace" font-size="14" fill="#8a7fb0">The model brings what it learned; the index brings what's true today. You answer with both.</text>

  <!-- question -->
  <rect x="40" y="150" width="150" height="60" rx="11" fill="none" stroke="#8a7fb0" stroke-width="1.8"/>
  <text x="115" y="178" text-anchor="middle" font-family="ui-monospace, monospace" font-size="12" fill="#ece7fb">question</text>
  <text x="115" y="196" text-anchor="middle" font-family="ui-monospace, monospace" font-size="10" fill="#8a7fb0">"what's my X policy?"</text>

  <!-- retriever -->
  <path d="M190 180 H 238" class="flow" stroke="#a78bfa" stroke-width="2" fill="none" marker-end="url(#av)"/>
  <rect x="240" y="150" width="130" height="60" rx="11" fill="none" stroke="#a78bfa" stroke-width="2" class="pulse"/>
  <text x="305" y="176" text-anchor="middle" font-family="ui-monospace, monospace" font-size="12" fill="#a78bfa">retriever</text>
  <text x="305" y="194" text-anchor="middle" font-family="ui-monospace, monospace" font-size="10" fill="#8a7fb0">finds the similar bits</text>

  <!-- external index -->
  <path d="M305 210 V 250" class="flow" stroke="#a78bfa" stroke-width="2" fill="none" marker-end="url(#av)"/>
  <rect x="210" y="256" width="200" height="132" rx="12" fill="#a78bfa" fill-opacity="0.06" stroke="#a78bfa" stroke-width="1.5" stroke-dasharray="4 4"/>
  <text x="310" y="279" text-anchor="middle" font-family="ui-monospace, monospace" font-size="12" fill="#a78bfa">external memory</text>
  <text x="310" y="296" text-anchor="middle" font-family="ui-monospace, monospace" font-size="9" fill="#8a7fb0">your documents</text>
  <text x="310" y="308" text-anchor="middle" font-family="ui-monospace, monospace" font-size="9" fill="#8a7fb0">updated without retraining</text>
  <g class="doc"><rect x="238" y="318" width="44" height="54" rx="5" fill="none" stroke="#8a7fb0" stroke-width="1.4"/></g>
  <g class="doc d2"><rect x="288" y="318" width="44" height="54" rx="5" fill="none" stroke="#8a7fb0" stroke-width="1.4"/></g>
  <g class="doc d3"><rect x="338" y="318" width="44" height="54" rx="5" fill="none" stroke="#34d399" stroke-width="1.8"/></g>
  <text x="360" y="349" text-anchor="middle" font-family="ui-monospace, monospace" font-size="9" fill="#34d399">✓</text>

  <!-- top docs to model -->
  <path d="M410 320 C 470 320, 470 200, 528 190" class="flow" stroke="#34d399" stroke-width="2" fill="none" marker-end="url(#ag)"/>
  <text x="470" y="268" font-family="ui-monospace, monospace" font-size="9.5" fill="#34d399">the 3 most</text>
  <text x="470" y="282" font-family="ui-monospace, monospace" font-size="9.5" fill="#34d399">relevant chunks</text>

  <!-- question also to model -->
  <path d="M115 150 C 250 96, 470 96, 605 150" class="flow" stroke="#8a7fb0" stroke-width="1.6" fill="none" marker-end="url(#av)"/>
  <text x="360" y="90" text-anchor="middle" font-family="ui-monospace, monospace" font-size="9.5" fill="#8a7fb0">+ the original question</text>

  <!-- model -->
  <rect x="530" y="150" width="150" height="70" rx="12" fill="none" stroke="#a78bfa" stroke-width="2.2" class="pulse"/>
  <text x="605" y="180" text-anchor="middle" font-family="ui-monospace, monospace" font-size="13" fill="#a78bfa">model</text>
  <text x="605" y="200" text-anchor="middle" font-family="ui-monospace, monospace" font-size="9.5" fill="#8a7fb0">own memory (what it learned)</text>

  <!-- answer -->
  <path d="M680 185 H 728" class="flow" stroke="#34d399" stroke-width="2" fill="none" marker-end="url(#ag)"/>
  <rect x="730" y="140" width="230" height="92" rx="12" fill="none" stroke="#34d399" stroke-width="2.2"/>
  <text x="845" y="168" text-anchor="middle" font-family="ui-monospace, monospace" font-size="12.5" fill="#34d399">answer with a source</text>
  <text x="845" y="190" text-anchor="middle" font-family="ui-monospace, monospace" font-size="10" fill="#ece7fb">grounded in your documents,</text>
  <text x="845" y="206" text-anchor="middle" font-family="ui-monospace, monospace" font-size="10" fill="#ece7fb">not in what the model recalls.</text>
  <text x="845" y="222" text-anchor="middle" font-family="ui-monospace, monospace" font-size="10" fill="#8a7fb0">you can cite it and check it</text>

  <rect x="730" y="290" width="230" height="88" rx="12" fill="#fb7185" fill-opacity="0.07" stroke="#fb7185" stroke-width="1.4"/>
  <text x="845" y="316" text-anchor="middle" font-family="ui-monospace, monospace" font-size="11.5" fill="#fb7185">without RAG</text>
  <text x="845" y="338" text-anchor="middle" font-family="ui-monospace, monospace" font-size="10" fill="#ece7fb">the model answers from memory:</text>
  <text x="845" y="354" text-anchor="middle" font-family="ui-monospace, monospace" font-size="10" fill="#ece7fb">it doesn't know your policy and can</text>
  <text x="845" y="370" text-anchor="middle" font-family="ui-monospace, monospace" font-size="10" fill="#fb7185">invent it with full confidence</text>

  <text x="40" y="420" font-family="ui-monospace, monospace" font-size="11.5" fill="#8a7fb0">When: private data, figures that change, and when you need to point at where the answer came from.</text>
  <text x="40" y="440" font-family="ui-monospace, monospace" font-size="11.5" fill="#8a7fb0">When not: if the answer already lives in the model, RAG only adds parts that can break.</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 480" role="img" aria-label="Cómo funciona RAG: la pregunta busca en una memoria externa, y el modelo responde con esos documentos y cita la fuente">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0d0b16"/><stop offset="1" stop-color="#181329"/>
    </linearGradient>
    <marker id="av" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0 0 L9 4.5 L0 9 z" fill="#a78bfa"/></marker>
    <marker id="ag" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0 0 L9 4.5 L0 9 z" fill="#34d399"/></marker>
  </defs>
  <style>
    .flow { stroke-dasharray: 5 6; animation: dash 1.7s linear infinite; }
    .doc { animation: bob 5s ease-in-out infinite; transform-box: fill-box; transform-origin: center; }
    .d2 { animation-delay: .5s; } .d3 { animation-delay: 1s; }
    .pulse { animation: pulse 3.4s ease-in-out infinite; transform-box: fill-box; transform-origin: center; }
    @keyframes dash { to { stroke-dashoffset: -44; } }
    @keyframes bob { 0%,100% { opacity: .8; } 50% { opacity: 1; } }
    @keyframes pulse { 0%,100% { opacity: .8; } 50% { opacity: 1; } }
  </style>

  <rect width="1000" height="480" fill="url(#bg)"/>
  <text x="40" y="46" font-family="Georgia, serif" font-size="29" fill="#ece7fb">RAG: dos memorias en vez de una</text>
  <text x="40" y="74" font-family="ui-monospace, monospace" font-size="14" fill="#8a7fb0">El modelo trae lo que aprendió; el índice trae lo que es verdad hoy. Se responde con las dos.</text>

  <!-- pregunta -->
  <rect x="40" y="150" width="150" height="60" rx="11" fill="none" stroke="#8a7fb0" stroke-width="1.8"/>
  <text x="115" y="178" text-anchor="middle" font-family="ui-monospace, monospace" font-size="12" fill="#ece7fb">pregunta</text>
  <text x="115" y="196" text-anchor="middle" font-family="ui-monospace, monospace" font-size="10" fill="#8a7fb0">"¿mi política de X?"</text>

  <!-- buscador -->
  <path d="M190 180 H 238" class="flow" stroke="#a78bfa" stroke-width="2" fill="none" marker-end="url(#av)"/>
  <rect x="240" y="150" width="130" height="60" rx="11" fill="none" stroke="#a78bfa" stroke-width="2" class="pulse"/>
  <text x="305" y="176" text-anchor="middle" font-family="ui-monospace, monospace" font-size="12" fill="#a78bfa">buscador</text>
  <text x="305" y="194" text-anchor="middle" font-family="ui-monospace, monospace" font-size="10" fill="#8a7fb0">encuentra lo parecido</text>

  <!-- indice externo -->
  <path d="M305 210 V 250" class="flow" stroke="#a78bfa" stroke-width="2" fill="none" marker-end="url(#av)"/>
  <rect x="210" y="256" width="200" height="132" rx="12" fill="#a78bfa" fill-opacity="0.06" stroke="#a78bfa" stroke-width="1.5" stroke-dasharray="4 4"/>
  <text x="310" y="279" text-anchor="middle" font-family="ui-monospace, monospace" font-size="12" fill="#a78bfa">memoria externa</text>
  <text x="310" y="296" text-anchor="middle" font-family="ui-monospace, monospace" font-size="9" fill="#8a7fb0">tus documentos</text>
  <text x="310" y="308" text-anchor="middle" font-family="ui-monospace, monospace" font-size="9" fill="#8a7fb0">se actualiza sin reentrenar</text>
  <g class="doc"><rect x="238" y="318" width="44" height="54" rx="5" fill="none" stroke="#8a7fb0" stroke-width="1.4"/></g>
  <g class="doc d2"><rect x="288" y="318" width="44" height="54" rx="5" fill="none" stroke="#8a7fb0" stroke-width="1.4"/></g>
  <g class="doc d3"><rect x="338" y="318" width="44" height="54" rx="5" fill="none" stroke="#34d399" stroke-width="1.8"/></g>
  <text x="360" y="349" text-anchor="middle" font-family="ui-monospace, monospace" font-size="9" fill="#34d399">✓</text>

  <!-- top docs al modelo -->
  <path d="M410 320 C 470 320, 470 200, 528 190" class="flow" stroke="#34d399" stroke-width="2" fill="none" marker-end="url(#ag)"/>
  <text x="470" y="268" font-family="ui-monospace, monospace" font-size="9.5" fill="#34d399">los 3 trozos</text>
  <text x="470" y="282" font-family="ui-monospace, monospace" font-size="9.5" fill="#34d399">más relevantes</text>

  <!-- pregunta tambien al modelo -->
  <path d="M115 150 C 250 96, 470 96, 605 150" class="flow" stroke="#8a7fb0" stroke-width="1.6" fill="none" marker-end="url(#av)"/>
  <text x="360" y="90" text-anchor="middle" font-family="ui-monospace, monospace" font-size="9.5" fill="#8a7fb0">+ la pregunta original</text>

  <!-- modelo -->
  <rect x="530" y="150" width="150" height="70" rx="12" fill="none" stroke="#a78bfa" stroke-width="2.2" class="pulse"/>
  <text x="605" y="180" text-anchor="middle" font-family="ui-monospace, monospace" font-size="13" fill="#a78bfa">modelo</text>
  <text x="605" y="200" text-anchor="middle" font-family="ui-monospace, monospace" font-size="9.5" fill="#8a7fb0">memoria propia (lo aprendido)</text>

  <!-- respuesta -->
  <path d="M680 185 H 728" class="flow" stroke="#34d399" stroke-width="2" fill="none" marker-end="url(#ag)"/>
  <rect x="730" y="140" width="230" height="92" rx="12" fill="none" stroke="#34d399" stroke-width="2.2"/>
  <text x="845" y="168" text-anchor="middle" font-family="ui-monospace, monospace" font-size="12.5" fill="#34d399">respuesta con fuente</text>
  <text x="845" y="190" text-anchor="middle" font-family="ui-monospace, monospace" font-size="10" fill="#ece7fb">apoyada en tus documentos,</text>
  <text x="845" y="206" text-anchor="middle" font-family="ui-monospace, monospace" font-size="10" fill="#ece7fb">no en lo que el modelo recuerde.</text>
  <text x="845" y="222" text-anchor="middle" font-family="ui-monospace, monospace" font-size="10" fill="#8a7fb0">se puede citar y comprobar</text>

  <rect x="730" y="290" width="230" height="88" rx="12" fill="#fb7185" fill-opacity="0.07" stroke="#fb7185" stroke-width="1.4"/>
  <text x="845" y="316" text-anchor="middle" font-family="ui-monospace, monospace" font-size="11.5" fill="#fb7185">sin RAG</text>
  <text x="845" y="338" text-anchor="middle" font-family="ui-monospace, monospace" font-size="10" fill="#ece7fb">el modelo responde de memoria:</text>
  <text x="845" y="354" text-anchor="middle" font-family="ui-monospace, monospace" font-size="10" fill="#ece7fb">no sabe tu política y puede</text>
  <text x="845" y="370" text-anchor="middle" font-family="ui-monospace, monospace" font-size="10" fill="#fb7185">inventarla con aplomo</text>

  <text x="40" y="420" font-family="ui-monospace, monospace" font-size="11.5" fill="#8a7fb0">Cuándo: datos privados, cifras que cambian, y cuando necesitas señalar de dónde salió la respuesta.</text>
  <text x="40" y="440" font-family="ui-monospace, monospace" font-size="11.5" fill="#8a7fb0">Cuándo no: si la respuesta ya vive en el modelo, RAG solo añade partes que se pueden romper.</text>
</svg>

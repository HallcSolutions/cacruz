<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 460" role="img" aria-label="Cómo la especificación ayuda a la IA">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0d0b16"/><stop offset="1" stop-color="#181329"/>
    </linearGradient>
    <linearGradient id="ac" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#a78bfa"/><stop offset="1" stop-color="#ffffff"/>
    </linearGradient>
    <marker id="aok" markerWidth="8" markerHeight="8" refX="6.2" refY="4" orient="auto">
      <path d="M0 0 L8 4 L0 8 z" fill="#a78bfa"/>
    </marker>
    <marker id="abad" markerWidth="8" markerHeight="8" refX="6.2" refY="4" orient="auto">
      <path d="M0 0 L8 4 L0 8 z" fill="#fb7185"/>
    </marker>
  </defs>
  <style>
    .flow { stroke-dasharray: 6 8; animation: dash 1.5s linear infinite; }
    .slow { stroke-dasharray: 6 10; animation: dash 2.6s linear infinite; }
    .q { animation: qp 1.8s ease-in-out infinite; transform-box: fill-box; transform-origin: center; }
    .t { animation: tp 2.4s ease-in-out infinite; transform-box: fill-box; transform-origin: center; }
    .ok { animation: okp 3s ease-in-out infinite; }
    @keyframes dash { to { stroke-dashoffset: -56; } }
    @keyframes qp { 0%,100% { opacity:.5; transform:scale(.9) rotate(-4deg);} 50% { opacity:1; transform:scale(1.1) rotate(4deg);} }
    @keyframes tp { 0%,100% { opacity:.7; transform:scale(1);} 50% { opacity:1; transform:scale(1.12);} }
    @keyframes okp { 0%,100% { opacity:.85;} 50% { opacity:1;} }
  </style>

  <rect width="1000" height="460" fill="url(#bg)"/>
  <text x="40" y="42" font-family="Georgia, serif" font-size="27" fill="#ece7fb">Cómo la especificación ayuda a la IA</text>
  <text x="40" y="68" font-family="ui-monospace, monospace" font-size="13.5" fill="#8a7fb0">el mismo pedido, sin plano y con plano</text>

  <!-- ═══ CARRIL 1: SIN SPEC ═══ -->
  <text x="40" y="102" font-family="ui-monospace, monospace" font-size="12.5" fill="#fb7185">SIN ESPECIFICACIÓN</text>

  <!-- entrada -->
  <rect x="40" y="116" width="200" height="86" rx="12" fill="none" stroke="#5a3a48" stroke-width="2"/>
  <text x="140" y="152" text-anchor="middle" font-family="ui-monospace, monospace" font-size="15" fill="#ece7fb">«hazlo ya»</text>
  <text x="140" y="176" text-anchor="middle" font-family="ui-monospace, monospace" font-size="11" fill="#8a7fb0">un pedido vago</text>
  <line x1="246" y1="159" x2="294" y2="159" class="slow" stroke="#fb7185" stroke-width="2" marker-end="url(#abad)"/>

  <!-- IA adivinando -->
  <rect x="300" y="116" width="230" height="86" rx="12" fill="none" stroke="#fb7185" stroke-width="2.4" stroke-dasharray="7 5"/>
  <text class="q" x="342" y="172" text-anchor="middle" font-family="Georgia, serif" font-size="44" fill="#fb7185">?</text>
  <text x="378" y="150" font-family="ui-monospace, monospace" font-size="13" fill="#ece7fb">IA adivinando</text>
  <text x="378" y="172" font-family="ui-monospace, monospace" font-size="10.5" fill="#8a7fb0">rellena los huecos</text>
  <text x="378" y="188" font-family="ui-monospace, monospace" font-size="10.5" fill="#8a7fb0">a su gusto</text>
  <line x1="536" y1="159" x2="604" y2="159" class="slow" stroke="#fb7185" stroke-width="2" marker-end="url(#abad)"/>

  <!-- resultado -->
  <rect x="610" y="116" width="350" height="86" rx="12" fill="none" stroke="#5a3a48" stroke-width="2"/>
  <text x="632" y="152" font-family="ui-monospace, monospace" font-size="15" fill="#fb7185">✗ no era lo que querías</text>
  <text x="632" y="178" font-family="ui-monospace, monospace" font-size="11.5" fill="#8a7fb0">a rehacer — y mañana, cambiarlo cuesta caro</text>

  <!-- ═══ CARRIL 2: CON SPEC ═══ -->
  <text x="40" y="248" font-family="ui-monospace, monospace" font-size="12.5" fill="#34d399">CON ESPECIFICACIÓN</text>

  <!-- entrada -->
  <rect x="40" y="262" width="200" height="86" rx="12" fill="none" stroke="url(#ac)" stroke-width="2.4"/>
  <text x="140" y="296" text-anchor="middle" font-family="ui-monospace, monospace" font-size="13.5" fill="#a78bfa">spec: QUÉ + POR QUÉ</text>
  <text x="140" y="320" text-anchor="middle" font-family="ui-monospace, monospace" font-size="11" fill="#8a7fb0">objetivo verificable</text>
  <line x1="246" y1="305" x2="294" y2="305" class="flow" stroke="#a78bfa" stroke-width="2" marker-end="url(#aok)"/>

  <!-- IA con rumbo -->
  <rect x="300" y="262" width="230" height="86" rx="12" fill="none" stroke="#a78bfa" stroke-width="2.4"/>
  <text class="t" x="342" y="318" text-anchor="middle" font-family="Georgia, serif" font-size="34" fill="#34d399">🎯</text>
  <text x="378" y="296" font-family="ui-monospace, monospace" font-size="13" fill="#ece7fb">IA con rumbo</text>
  <text x="378" y="318" font-family="ui-monospace, monospace" font-size="10.5" fill="#8a7fb0">cumple un objetivo</text>
  <text x="378" y="334" font-family="ui-monospace, monospace" font-size="10.5" fill="#8a7fb0">exacto</text>
  <line x1="536" y1="305" x2="604" y2="305" class="flow" stroke="#a78bfa" stroke-width="2" marker-end="url(#aok)"/>

  <!-- resultado -->
  <rect class="ok" x="610" y="262" width="350" height="86" rx="12" fill="none" stroke="#34d399" stroke-width="2.4"/>
  <text x="632" y="298" font-family="ui-monospace, monospace" font-size="15" fill="#34d399">✓ lo que pediste, a la primera</text>
  <text x="632" y="324" font-family="ui-monospace, monospace" font-size="11.5" fill="#8a7fb0">y mañana, cambiarlo es fácil y seguro</text>

  <text x="500" y="416" text-anchor="middle" font-family="Georgia, serif" font-size="16.5" fill="#ece7fb" font-style="italic">La IA no falla por mala: falla porque no sabe qué querías. La spec le da el mapa.</text>
</svg>

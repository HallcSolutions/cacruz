<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 460" role="img" aria-label="How a specification is built">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0d0b16"/><stop offset="1" stop-color="#181329"/>
    </linearGradient>
    <linearGradient id="ac" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#a78bfa"/><stop offset="1" stop-color="#ffffff"/>
    </linearGradient>
    <marker id="arrow" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0 0 L9 4.5 L0 9 z" fill="#a78bfa"/>
    </marker>
  </defs>
  <style>
    .step { animation: pop 6s ease-in-out infinite; transform-box: fill-box; transform-origin: center; }
    .s2 { animation-delay: 0.5s; } .s3 { animation-delay: 1s; } .s4 { animation-delay: 1.5s; } .s5 { animation-delay: 2s; }
    .flow { stroke-dasharray: 6 8; animation: dash 1.6s linear infinite; }
    .redgreen { animation: rg 3s ease-in-out infinite; }
    @keyframes pop { 0%, 100% { opacity: .78; transform: translateY(0); } 8% { opacity: 1; transform: translateY(-4px); } 20% { opacity: .95; } }
    @keyframes dash { to { stroke-dashoffset: -56; } }
    @keyframes rg { 0%, 45% { fill: #fb7185; } 55%, 100% { fill: #34d399; } }
  </style>

  <rect width="1000" height="460" fill="url(#bg)"/>
  <text x="40" y="52" font-family="Georgia, serif" font-size="30" fill="#ece7fb">How a specification is built</text>
  <text x="40" y="80" font-family="ui-monospace, monospace" font-size="15" fill="#8a7fb0">chalc · Spec-Driven Development</text>

  <g class="step">
    <rect x="40" y="130" width="150" height="120" rx="14" fill="none" stroke="#453768" stroke-width="2"/>
    <text x="115" y="168" text-anchor="middle" font-size="30">💡</text>
    <text x="115" y="200" text-anchor="middle" font-family="ui-monospace, monospace" font-size="14" fill="#ece7fb">idea</text>
    <text x="115" y="222" text-anchor="middle" font-family="ui-monospace, monospace" font-size="11" fill="#8a7fb0">user story</text>
  </g>
  <line x1="196" y1="190" x2="244" y2="190" class="flow" stroke="#a78bfa" stroke-width="2" marker-end="url(#arrow)"/>

  <g class="step s2">
    <rect x="250" y="130" width="170" height="120" rx="14" fill="none" stroke="url(#ac)" stroke-width="2.5"/>
    <text x="335" y="163" text-anchor="middle" font-family="ui-monospace, monospace" font-size="13" fill="#a78bfa">spec.md</text>
    <text x="335" y="190" text-anchor="middle" font-family="ui-monospace, monospace" font-size="12" fill="#ece7fb">R1 · R2 · R3…</text>
    <text x="335" y="212" text-anchor="middle" font-family="ui-monospace, monospace" font-size="10" fill="#8a7fb0">WHEN … SHALL …</text>
    <text x="335" y="232" text-anchor="middle" font-family="ui-monospace, monospace" font-size="10" fill="#8a7fb0">the WHAT and the WHY</text>
  </g>
  <line x1="426" y1="190" x2="474" y2="190" class="flow" stroke="#a78bfa" stroke-width="2" marker-end="url(#arrow)"/>

  <g class="step s3">
    <rect x="480" y="130" width="150" height="120" rx="14" fill="none" stroke="#453768" stroke-width="2"/>
    <text x="555" y="163" text-anchor="middle" font-family="ui-monospace, monospace" font-size="13" fill="#a78bfa">plan.md</text>
    <text x="555" y="192" text-anchor="middle" font-family="ui-monospace, monospace" font-size="11" fill="#ece7fb">architecture</text>
    <text x="555" y="214" text-anchor="middle" font-family="ui-monospace, monospace" font-size="11" fill="#ece7fb">contracts</text>
    <text x="555" y="234" text-anchor="middle" font-family="ui-monospace, monospace" font-size="10" fill="#8a7fb0">the HOW</text>
  </g>
  <line x1="636" y1="190" x2="684" y2="190" class="flow" stroke="#a78bfa" stroke-width="2" marker-end="url(#arrow)"/>

  <g class="step s4">
    <rect x="690" y="130" width="150" height="120" rx="14" fill="none" stroke="#453768" stroke-width="2"/>
    <text x="765" y="163" text-anchor="middle" font-family="ui-monospace, monospace" font-size="13" fill="#a78bfa">tasks.md</text>
    <text x="765" y="192" text-anchor="middle" font-family="ui-monospace, monospace" font-size="11" fill="#ece7fb">T1 → R1</text>
    <text x="765" y="214" text-anchor="middle" font-family="ui-monospace, monospace" font-size="11" fill="#ece7fb">T2 → R2</text>
    <text x="765" y="234" text-anchor="middle" font-family="ui-monospace, monospace" font-size="10" fill="#8a7fb0">traceability</text>
  </g>

  <path d="M765 256 v42 h-380" class="flow" stroke="#a78bfa" stroke-width="2" fill="none" marker-end="url(#arrow)"/>

  <g class="step s5">
    <rect x="150" y="316" width="480" height="104" rx="14" fill="none" stroke="url(#ac)" stroke-width="2.5"/>
    <circle class="redgreen" cx="196" cy="368" r="12"/>
    <text x="230" y="358" font-family="ui-monospace, monospace" font-size="13" fill="#ece7fb">failing test → minimum code → refactor</text>
    <text x="230" y="382" font-family="ui-monospace, monospace" font-size="11" fill="#8a7fb0">mutation testing: the tests get tested too</text>
  </g>

  <g class="step s5">
    <rect x="690" y="316" width="270" height="104" rx="14" fill="none" stroke="#34d399" stroke-width="2"/>
    <text x="825" y="356" text-anchor="middle" font-family="ui-monospace, monospace" font-size="14" fill="#34d399">✓ feature shipped</text>
    <text x="825" y="382" text-anchor="middle" font-family="ui-monospace, monospace" font-size="11" fill="#8a7fb0">every line justified by an R#</text>
  </g>
  <line x1="636" y1="368" x2="684" y2="368" class="flow" stroke="#34d399" stroke-width="2" marker-end="url(#arrow)"/>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 460" role="img" aria-label="La ilusión de velocidad: lo que creemos frente a lo que midieron">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0d0b16"/><stop offset="1" stop-color="#181329"/>
    </linearGradient>
    <linearGradient id="gre" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#34d399" stop-opacity=".15"/><stop offset="1" stop-color="#34d399" stop-opacity=".55"/>
    </linearGradient>
    <linearGradient id="red" x1="1" y1="0" x2="0" y2="0">
      <stop offset="0" stop-color="#fb7185" stop-opacity=".15"/><stop offset="1" stop-color="#fb7185" stop-opacity=".55"/>
    </linearGradient>
  </defs>
  <style>
    .grow1 { animation: g1 3.6s ease-in-out infinite; transform-box: fill-box; transform-origin: left center; }
    .grow2 { animation: g2 3.6s ease-in-out infinite; transform-box: fill-box; transform-origin: right center; }
    .blink { animation: bk 2.2s ease-in-out infinite; }
    .gapline { stroke-dasharray: 5 7; animation: dash 2s linear infinite; }
    @keyframes g1 { 0%,100% { transform:scaleX(.86);} 50% { transform:scaleX(1);} }
    @keyframes g2 { 0%,100% { transform:scaleX(.86);} 50% { transform:scaleX(1);} }
    @keyframes bk { 0%,100% { opacity:.6;} 50% { opacity:1;} }
    @keyframes dash { to { stroke-dashoffset: -48; } }
  </style>

  <rect width="1000" height="460" fill="url(#bg)"/>
  <text x="40" y="42" font-family="Georgia, serif" font-size="27" fill="#ece7fb">La ilusión de velocidad</text>
  <text x="40" y="68" font-family="ui-monospace, monospace" font-size="13.5" fill="#8a7fb0">METR, 2025 · 16 programadores expertos, 246 tareas reales en sus propios repositorios</text>

  <!-- eje central -->
  <line x1="500" y1="118" x2="500" y2="330" stroke="#3a3350" stroke-width="1.5"/>
  <text x="500" y="352" text-anchor="middle" font-family="ui-monospace, monospace" font-size="11" fill="#8a7fb0">sin IA (línea base)</text>

  <!-- barra: lo que creyeron -->
  <text x="40" y="140" font-family="ui-monospace, monospace" font-size="12.5" fill="#34d399">LO QUE CREYERON DESPUÉS</text>
  <rect class="grow1" x="500" y="152" width="230" height="52" rx="8" fill="url(#gre)" stroke="#34d399" stroke-width="2"/>
  <text x="752" y="184" font-family="ui-monospace, monospace" font-size="20" fill="#34d399">+20% más rápidos</text>
  <text x="516" y="228" font-family="ui-monospace, monospace" font-size="11.5" fill="#8a7fb0">su sensación al terminar</text>

  <!-- barra: lo que midieron -->
  <text x="40" y="272" font-family="ui-monospace, monospace" font-size="12.5" fill="#fb7185">LO QUE MIDIÓ EL CRONÓMETRO</text>
  <rect class="grow2" x="282" y="284" width="218" height="52" rx="8" fill="url(#red)" stroke="#fb7185" stroke-width="2"/>
  <text x="268" y="316" text-anchor="end" font-family="ui-monospace, monospace" font-size="20" fill="#fb7185">−19% más lentos</text>
  <text x="282" y="380" font-family="ui-monospace, monospace" font-size="11.5" fill="#8a7fb0">tiempo real de entrega</text>

  <!-- brecha -->
  <line class="gapline" x1="730" y1="204" x2="730" y2="284" stroke="#a78bfa" stroke-width="2"/>
  <line class="gapline" x1="282" y1="284" x2="730" y2="284" stroke="#a78bfa" stroke-width="2"/>
  <text class="blink" x="760" y="252" font-family="ui-monospace, monospace" font-size="13" fill="#a78bfa">39 puntos de diferencia</text>
  <text x="760" y="272" font-family="ui-monospace, monospace" font-size="11" fill="#8a7fb0">entre sentirse rápido y serlo</text>

  <text x="500" y="416" text-anchor="middle" font-family="Georgia, serif" font-size="16.5" fill="#ece7fb" font-style="italic">Ir sin revisar se siente rápido. La sensación no es el dato: por eso se mide.</text>
</svg>

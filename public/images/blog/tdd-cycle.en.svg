<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 500" role="img" aria-label="TDD cycle and mutation testing">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0d0b16"/><stop offset="1" stop-color="#181329"/>
    </linearGradient>
    <marker id="a1" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0 0 L9 4.5 L0 9 z" fill="#a78bfa"/>
    </marker>
  </defs>
  <style>
    .orbit { transform-origin: 300px 280px; animation: spin 9s linear infinite; }
    .phase { transform-box: fill-box; transform-origin: center; animation: beat 3s ease-in-out infinite; }
    .p2 { animation-delay: 1s; } .p3 { animation-delay: 2s; }
    .mut { animation: mut 2.4s ease-in-out infinite; }
    .m2 { animation-delay: .5s; } .m3 { animation-delay: 1s; }
    .flow { stroke-dasharray: 6 8; animation: dash 1.5s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes beat { 0%,100% { transform: scale(1); opacity:.85 } 50% { transform: scale(1.06); opacity:1 } }
    @keyframes mut { 0%,100% { opacity:.35 } 50% { opacity:1 } }
    @keyframes dash { to { stroke-dashoffset: -56; } }
  </style>

  <rect width="1000" height="500" fill="url(#bg)"/>
  <text x="40" y="52" font-family="Georgia, serif" font-size="30" fill="#ece7fb">The cycle: Red → Green → Refactor → Mutants</text>
  <text x="40" y="80" font-family="ui-monospace, monospace" font-size="15" fill="#8a7fb0">a complete, verifiable feature in hours — not days</text>

  <circle cx="300" cy="280" r="128" fill="none" stroke="#332a52" stroke-width="2" stroke-dasharray="4 8"/>
  <g class="orbit">
    <circle cx="300" cy="152" r="7" fill="#a78bfa"/>
  </g>

  <g class="phase">
    <circle cx="300" cy="160" r="46" fill="none" stroke="#fb7185" stroke-width="2.5"/>
    <text x="300" y="156" text-anchor="middle" font-family="ui-monospace, monospace" font-size="14" fill="#fb7185">RED</text>
    <text x="300" y="176" text-anchor="middle" font-family="ui-monospace, monospace" font-size="10" fill="#8a7fb0">failing test</text>
  </g>

  <g class="phase p2">
    <circle cx="410" cy="345" r="46" fill="none" stroke="#34d399" stroke-width="2.5"/>
    <text x="410" y="341" text-anchor="middle" font-family="ui-monospace, monospace" font-size="14" fill="#34d399">GREEN</text>
    <text x="410" y="361" text-anchor="middle" font-family="ui-monospace, monospace" font-size="10" fill="#8a7fb0">minimum code</text>
  </g>

  <g class="phase p3">
    <circle cx="190" cy="345" r="46" fill="none" stroke="#a78bfa" stroke-width="2.5"/>
    <text x="190" y="341" text-anchor="middle" font-family="ui-monospace, monospace" font-size="13" fill="#a78bfa">REFACTOR</text>
    <text x="190" y="361" text-anchor="middle" font-family="ui-monospace, monospace" font-size="10" fill="#8a7fb0">stay green</text>
  </g>

  <text x="300" y="286" text-anchor="middle" font-family="ui-monospace, monospace" font-size="13" fill="#ece7fb">R1 · R2 · R3</text>
  <text x="300" y="306" text-anchor="middle" font-family="ui-monospace, monospace" font-size="10" fill="#8a7fb0">each test → one requirement</text>

  <line x1="440" y1="280" x2="558" y2="280" class="flow" stroke="#a78bfa" stroke-width="2" marker-end="url(#a1)"/>
  <text x="500" y="266" text-anchor="middle" font-family="ui-monospace, monospace" font-size="11" fill="#8a7fb0">green ✓</text>

  <rect x="570" y="150" width="390" height="260" rx="16" fill="none" stroke="#453768" stroke-width="2"/>
  <text x="765" y="186" text-anchor="middle" font-family="ui-monospace, monospace" font-size="14" fill="#a78bfa">mutation testing</text>
  <text x="765" y="210" text-anchor="middle" font-family="ui-monospace, monospace" font-size="11" fill="#8a7fb0">artificial bugs are injected into the code</text>

  <g font-family="ui-monospace, monospace" font-size="12">
    <g class="mut">
      <rect x="600" y="234" width="330" height="34" rx="8" fill="none" stroke="#332a52"/>
      <text x="616" y="256" fill="#ece7fb">if (a &gt; b)  →  if (a &gt;= b)</text>
      <text x="912" y="256" text-anchor="end" fill="#34d399">☠ killed</text>
    </g>
    <g class="mut m2">
      <rect x="600" y="278" width="330" height="34" rx="8" fill="none" stroke="#332a52"/>
      <text x="616" y="300" fill="#ece7fb">return x  →  return null</text>
      <text x="912" y="300" text-anchor="end" fill="#34d399">☠ killed</text>
    </g>
    <g class="mut m3">
      <rect x="600" y="322" width="330" height="34" rx="8" fill="none" stroke="#fb7185"/>
      <text x="616" y="344" fill="#ece7fb">length &gt; 0  →  length &gt;= 0</text>
      <text x="912" y="344" text-anchor="end" fill="#fb7185">✓ survived</text>
    </g>
  </g>
  <text x="765" y="386" text-anchor="middle" font-family="ui-monospace, monospace" font-size="11" fill="#fb7185">survived = the test was weak → strengthen it</text>

  <rect x="190" y="428" width="620" height="52" rx="12" fill="none" stroke="#34d399" stroke-width="2"/>
  <text x="500" y="460" text-anchor="middle" font-family="ui-monospace, monospace" font-size="13" fill="#34d399">✓ feature shipped · real coverage ≥ 80% mutants killed</text>
</svg>

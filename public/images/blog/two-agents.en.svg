<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 600" role="img" aria-label="Two agents working together">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0d0b16"/><stop offset="1" stop-color="#181329"/>
    </linearGradient>
    <linearGradient id="ac" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#a78bfa"/><stop offset="1" stop-color="#ffffff"/>
    </linearGradient>
    <marker id="av" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0 0 L9 4.5 L0 9 z" fill="#a78bfa"/>
    </marker>
    <marker id="ag" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0 0 L9 4.5 L0 9 z" fill="#34d399"/>
    </marker>
    <marker id="arj" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0 0 L9 4.5 L0 9 z" fill="#fb7185"/>
    </marker>
  </defs>
  <style>
    .agent { transform-box: fill-box; transform-origin: center; animation: breathe 4s ease-in-out infinite; }
    .a2 { animation-delay: 1.3s } .a3 { animation-delay: 2.6s }
    .doc { animation: docpulse 3.4s ease-in-out infinite; }
    .d2 { animation-delay: 1.7s }
    .wire { stroke-dasharray: 5 8; animation: flow 1.7s linear infinite; }
    @keyframes breathe { 0%,100% { opacity:.82; transform: translateY(0) } 50% { opacity:1; transform: translateY(-4px) } }
    @keyframes docpulse { 0%,100% { opacity:.6 } 50% { opacity:1 } }
    @keyframes flow { to { stroke-dashoffset: -52 } }
  </style>

  <rect width="1000" height="600" fill="url(#bg)"/>
  <text x="40" y="46" font-family="Georgia, serif" font-size="27" fill="#ece7fb">Two agents don't chat: they leave artifacts</text>
  <text x="40" y="72" font-family="ui-monospace, monospace" font-size="13" fill="#8a7fb0">whoever writes the code never approves it</text>

  <g class="agent">
    <rect x="40" y="110" width="220" height="112" rx="16" fill="none" stroke="url(#ac)" stroke-width="2.5"/>
    <text x="60" y="142" font-size="19">🧠</text>
    <text x="90" y="144" font-family="ui-monospace, monospace" font-size="13" fill="#a78bfa">LEADER</text>
    <text x="60" y="170" font-family="ui-monospace, monospace" font-size="9.5" fill="#ece7fb">strong model · 1 call</text>
    <text x="60" y="190" font-family="ui-monospace, monospace" font-size="9.5" fill="#8a7fb0">sees the whole project</text>
    <text x="60" y="208" font-family="ui-monospace, monospace" font-size="9.5" fill="#8a7fb0">and writes the orders</text>
  </g>
  <line x1="266" y1="166" x2="300" y2="166" class="wire" stroke="#a78bfa" stroke-width="2" marker-end="url(#av)"/>

  <g class="doc">
    <rect x="308" y="124" width="120" height="84" rx="10" fill="none" stroke="#34d399" stroke-width="2"/>
    <text x="368" y="152" text-anchor="middle" font-family="ui-monospace, monospace" font-size="10.5" fill="#34d399">📋 plan.md</text>
    <text x="368" y="174" text-anchor="middle" font-family="ui-monospace, monospace" font-size="9" fill="#8a7fb0">[ ] T1 → R1</text>
    <text x="368" y="192" text-anchor="middle" font-family="ui-monospace, monospace" font-size="9" fill="#8a7fb0">[ ] T2 → R2</text>
  </g>
  <line x1="434" y1="166" x2="468" y2="166" class="wire" stroke="#a78bfa" stroke-width="2" marker-end="url(#av)"/>

  <g class="agent a2">
    <rect x="476" y="110" width="230" height="112" rx="16" fill="none" stroke="#453768" stroke-width="2"/>
    <text x="496" y="142" font-size="19">⚙️</text>
    <text x="526" y="144" font-family="ui-monospace, monospace" font-size="13" fill="#a78bfa">DEVELOPER</text>
    <text x="496" y="170" font-family="ui-monospace, monospace" font-size="9.5" fill="#ece7fb">cheap model · N calls</text>
    <text x="496" y="190" font-family="ui-monospace, monospace" font-size="9.5" fill="#8a7fb0">ONE task at a time,</text>
    <text x="496" y="208" font-family="ui-monospace, monospace" font-size="9.5" fill="#8a7fb0">with ITS context only</text>
  </g>
  <line x1="712" y1="166" x2="746" y2="166" class="wire" stroke="#a78bfa" stroke-width="2" marker-end="url(#av)"/>

  <g class="doc d2">
    <rect x="754" y="124" width="120" height="84" rx="10" fill="none" stroke="#34d399" stroke-width="2"/>
    <text x="814" y="152" text-anchor="middle" font-family="ui-monospace, monospace" font-size="10.5" fill="#34d399">📝 diff</text>
    <text x="814" y="174" text-anchor="middle" font-family="ui-monospace, monospace" font-size="9" fill="#8a7fb0">+ 42 lines</text>
    <text x="814" y="192" text-anchor="middle" font-family="ui-monospace, monospace" font-size="9" fill="#8a7fb0">tests green</text>
  </g>

  <path d="M814 214 v50 h-314" class="wire" stroke="#a78bfa" stroke-width="2" fill="none" marker-end="url(#av)"/>

  <g class="agent a3">
    <rect x="330" y="284" width="340" height="120" rx="16" fill="none" stroke="url(#ac)" stroke-width="2.5"/>
    <text x="352" y="318" font-size="19">🔍</text>
    <text x="382" y="320" font-family="ui-monospace, monospace" font-size="13" fill="#a78bfa">REVIEWER</text>
    <text x="352" y="348" font-family="ui-monospace, monospace" font-size="10" fill="#ece7fb">a DIFFERENT model, on purpose</text>
    <text x="352" y="370" font-family="ui-monospace, monospace" font-size="9.5" fill="#8a7fb0">checks the diff against the spec:</text>
    <text x="352" y="388" font-family="ui-monospace, monospace" font-size="9.5" fill="#8a7fb0">does it meet R1? does it meet R2?</text>
  </g>

  <path d="M400 410 v40" class="wire" stroke="#fb7185" stroke-width="2" fill="none" marker-end="url(#arj)"/>
  <path d="M600 410 v40" class="wire" stroke="#34d399" stroke-width="2" fill="none" marker-end="url(#ag)"/>

  <g>
    <rect x="70" y="456" width="380" height="76" rx="12" fill="none" stroke="#fb7185" stroke-width="2"/>
    <text x="94" y="486" font-family="ui-monospace, monospace" font-size="11.5" fill="#fb7185">✗ "R2 unmet"</text>
    <text x="94" y="508" font-family="ui-monospace, monospace" font-size="9.5" fill="#ece7fb">back to the developer, with the file</text>
    <text x="94" y="524" font-family="ui-monospace, monospace" font-size="9.5" fill="#8a7fb0">and the exact cause — not a scolding</text>
  </g>

  <g>
    <rect x="550" y="456" width="380" height="76" rx="12" fill="none" stroke="#34d399" stroke-width="2"/>
    <text x="574" y="486" font-family="ui-monospace, monospace" font-size="11.5" fill="#34d399">✓ approved</text>
    <text x="574" y="508" font-family="ui-monospace, monospace" font-size="9.5" fill="#ece7fb">meets the spec, respects the architecture</text>
    <text x="574" y="524" font-family="ui-monospace, monospace" font-size="9.5" fill="#8a7fb0">compiling isn't enough — I read the diff</text>
  </g>

  <path d="M70 494 H24 V244 H591 V228" class="wire" stroke="#fb7185" stroke-width="1.5" fill="none" marker-end="url(#arj)" opacity="0.6"/>
  <text x="300" y="238" font-family="ui-monospace, monospace" font-size="9" fill="#fb7185" opacity="0.75">fixed, then reviewed again</text>

  <text x="40" y="574" font-family="Georgia, serif" font-size="19" fill="#ece7fb" font-style="italic">An author can't see their own habits. Another model spots them in seconds.</text>
</svg>

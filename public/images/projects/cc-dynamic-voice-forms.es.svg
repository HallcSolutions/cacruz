<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" role="img" aria-label="cc-dynamic-voice-forms">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1a1114"/><stop offset="1" stop-color="#2b1420"/>
    </linearGradient>
    <linearGradient id="ac" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#fb7185"/><stop offset="1" stop-color="#f59e0b"/>
    </linearGradient>
  </defs>
  <style>
    .bar { transform-box: fill-box; transform-origin: center; animation: eq 1.1s ease-in-out infinite alternate; }
    .b2 { animation-delay: -0.2s; } .b3 { animation-delay: -0.45s; } .b4 { animation-delay: -0.6s; }
    .b5 { animation-delay: -0.8s; } .b6 { animation-delay: -0.95s; }
    .field { animation: glowpulse 2.6s ease-in-out infinite; }
    @keyframes eq { from { transform: scaleY(0.35); } to { transform: scaleY(1); } }
    @keyframes glowpulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.45; } }
  </style>
  <rect width="800" height="500" fill="url(#bg)"/>
  <circle cx="700" cy="400" r="190" fill="#fb7185" opacity="0.08"/>
  <g stroke="url(#ac)" stroke-width="10" stroke-linecap="round">
    <line class="bar" x1="140" y1="220" x2="140" y2="280"/>
    <line class="bar b2" x1="185" y1="190" x2="185" y2="310"/>
    <line class="bar b3" x1="230" y1="150" x2="230" y2="350"/>
    <line class="bar b4" x1="275" y1="205" x2="275" y2="295"/>
    <line class="bar b5" x1="320" y1="175" x2="320" y2="325"/>
    <line class="bar b6" x1="365" y1="230" x2="365" y2="270"/>
  </g>
  <g transform="translate(470 150)">
    <rect x="0" y="0" width="210" height="46" rx="10" fill="none" stroke="#5c3040" stroke-width="2"/>
    <rect x="0" y="72" width="210" height="46" rx="10" fill="none" stroke="#5c3040" stroke-width="2"/>
    <rect x="0" y="144" width="210" height="46" rx="10" fill="none" stroke="url(#ac)" stroke-width="2.5"/>
    <rect class="field" x="14" y="160" width="110" height="14" rx="7" fill="#fb7185" opacity="0.8"/>
  </g>
  <text x="140" y="428" font-family="Georgia, serif" font-size="34" fill="#fde8ec" font-style="italic">habla, y el formulario aparece</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" role="img" aria-label="chalc-cli-adapter">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#120e1e"/><stop offset="1" stop-color="#1d1533"/>
    </linearGradient>
    <linearGradient id="ac" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#a78bfa"/><stop offset="1" stop-color="#ffffff"/>
    </linearGradient>
  </defs>
  <style>
    .tline { animation: type 4s ease-in-out infinite; }
    .t2 { animation-delay: 0.5s; } .t3 { animation-delay: 1s; } .t4 { animation-delay: 1.5s; }
    .cur { animation: blink 1s steps(2) infinite; }
    .wire { stroke-dasharray: 4 8; animation: flow 2s linear infinite; }
    .target { animation: glowpulse 3.2s ease-in-out infinite; }
    .g2 { animation-delay: 0.8s; } .g3 { animation-delay: 1.6s; } .g4 { animation-delay: 2.4s; }
    @keyframes type { 0%, 100% { opacity: 0.45; } 50% { opacity: 1; } }
    @keyframes blink { 50% { opacity: 0; } }
    @keyframes flow { to { stroke-dashoffset: -36; } }
    @keyframes glowpulse { 0%, 100% { opacity: 0.55; } 50% { opacity: 1; } }
  </style>
  <rect width="800" height="500" fill="url(#bg)"/>
  <circle cx="700" cy="100" r="170" fill="#a78bfa" opacity="0.09"/>

  <!-- terminal: chalc detecta y equipa sin IA -->
  <g>
    <rect x="70" y="90" width="360" height="270" rx="14" fill="none" stroke="#453768" stroke-width="2.5"/>
    <line x1="70" y1="130" x2="430" y2="130" stroke="#453768" stroke-width="2"/>
    <circle cx="94" cy="110" r="5" fill="#a78bfa"/><circle cx="112" cy="110" r="5" fill="#453768"/><circle cx="130" cy="110" r="5" fill="#453768"/>
    <g font-family="ui-monospace, monospace" font-size="20">
      <text class="tline" x="92" y="170" fill="url(#ac)">$ chalc</text>
      <text class="tline t2" x="92" y="206" fill="#8a7fb0">→ detect: angular 20</text>
      <text class="tline t3" x="92" y="242" fill="#8a7fb0">→ skills · mcp · rules</text>
      <text class="tline t4" x="92" y="278" fill="#8a7fb0">→ method: sdd ✓</text>
      <text x="92" y="322" fill="#a78bfa">$</text>
    </g>
    <rect class="cur" x="112" y="306" width="10" height="18" fill="#a78bfa"/>
  </g>

  <!-- el equipamiento viaja a cada asistente en su formato -->
  <g fill="none" stroke="#a78bfa" stroke-width="2.5">
    <path class="wire" d="M430 160 h70 l40 -45"/>
    <path class="wire" d="M430 205 h110" opacity="0.75"/>
    <path class="wire" d="M430 250 h60 l45 45" opacity="0.75"/>
    <path class="wire" d="M430 295 h60 l45 95"/>
  </g>
  <g font-family="ui-monospace, monospace" font-size="18" text-anchor="middle">
    <g class="target">
      <rect x="560" y="88" width="170" height="44" rx="22" fill="none" stroke="url(#ac)" stroke-width="2.5"/>
      <text x="645" y="116" fill="#e8e4f7">claude code</text>
    </g>
    <g class="target g2">
      <rect x="560" y="183" width="170" height="44" rx="22" fill="none" stroke="#8a7fb0" stroke-width="2"/>
      <text x="645" y="211" fill="#b7aed6">copilot</text>
    </g>
    <g class="target g3">
      <rect x="560" y="273" width="170" height="44" rx="22" fill="none" stroke="#8a7fb0" stroke-width="2"/>
      <text x="645" y="301" fill="#b7aed6">cursor</text>
    </g>
    <g class="target g4">
      <rect x="560" y="368" width="170" height="44" rx="22" fill="none" stroke="#8a7fb0" stroke-width="2"/>
      <text x="645" y="396" fill="#b7aed6">gemini cli</text>
    </g>
  </g>

  <text x="70" y="440" font-family="Georgia, serif" font-size="32" fill="#ece7fb" font-style="italic">skills, MCP &amp; rules that travel with your project</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" role="img" aria-label="whatsapp-openai-bot-service">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0c1712"/><stop offset="1" stop-color="#10241b"/>
    </linearGradient>
    <linearGradient id="ac" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#34d399"/><stop offset="1" stop-color="#4ade80"/>
    </linearGradient>
  </defs>
  <style>
    .dot { animation: blink 1.3s ease-in-out infinite; }
    .d2 { animation-delay: 0.22s; } .d3 { animation-delay: 0.44s; }
    .bubble { transform-box: fill-box; transform-origin: center; animation: bob 4.5s ease-in-out infinite; }
    .b-in { animation-delay: -2.2s; }
    @keyframes blink { 0%, 100% { opacity: 0.25; } 50% { opacity: 1; } }
    @keyframes bob { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
  </style>
  <rect width="800" height="500" fill="url(#bg)"/>
  <circle cx="710" cy="90" r="170" fill="#34d399" opacity="0.09"/>
  <g class="bubble b-in">
    <path d="M140 130 h300 a16 16 0 0 1 16 16 v54 a16 16 0 0 1 -16 16 h-270 l-30 26 z" fill="none" stroke="#2b5a44" stroke-width="2.5"/>
    <rect x="170" y="158" width="200" height="14" rx="7" fill="#2b5a44"/>
  </g>
  <g class="bubble">
    <path d="M660 260 h-300 a16 16 0 0 0 -16 16 v54 a16 16 0 0 0 16 16 h270 l30 26 z" fill="none" stroke="url(#ac)" stroke-width="2.5"/>
    <rect x="376" y="288" width="230" height="14" rx="7" fill="#34d399" opacity="0.85"/>
    <rect x="376" y="312" width="150" height="14" rx="7" fill="#34d399" opacity="0.5"/>
  </g>
  <g>
    <circle class="dot" cx="680" cy="180" r="6" fill="#4ade80"/>
    <circle class="dot d2" cx="700" cy="180" r="6" fill="#4ade80"/>
    <circle class="dot d3" cx="720" cy="180" r="6" fill="#4ade80"/>
  </g>
  <text x="140" y="428" font-family="Georgia, serif" font-size="34" fill="#e2f7ec" font-style="italic">chat, answered by GPT</text>
</svg>

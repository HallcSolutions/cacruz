<div class="scroll-progress" aria-hidden="true"></div>

<header class="shell__header" [class.shell__header--open]="menuOpen()">
  <a routerLink="/" class="shell__brand" (click)="closeMenu()">
    <img class="shell__logo" src="images/logo.png" alt="Logo DC — Christian Cruz" />
    <span class="shell__pipeline" aria-hidden="true">
      <span class="shell__deploy">
        <span class="shell__deploy-track">
          <span class="shell__deploy-fill"></span>
          <span class="shell__deploy-commit"></span>
        </span>
        <span class="shell__deploy-word">
          <span>commit</span>
          <span>push</span>
          <span>build</span>
          <span>tests</span>
          <span class="shell__deploy-live">live</span>
        </span>
      </span>

      <span class="shell__files">
        <span class="shell__files-list">
          @for (file of pipelineFiles; track file) {
            <span class="shell__file">{{ file }}</span>
          }
        </span>
      </span>
    </span>
  </a>

  <button
    type="button"
    class="shell__burger"
    [class.shell__burger--open]="menuOpen()"
    [attr.aria-expanded]="menuOpen()"
    aria-controls="main-nav"
    aria-label="Menú"
    (click)="toggleMenu()"
  >
    <span></span>
    <span></span>
    <span></span>
  </button>

  <nav id="main-nav" class="shell__nav" [class.shell__nav--open]="menuOpen()">
    <a
      routerLink="/"
      routerLinkActive="is-active"
      [routerLinkActiveOptions]="{ exact: true }"
      (click)="closeMenu()"
    >
      {{ 'nav.home' | t }}
    </a>
    <a routerLink="/experience" routerLinkActive="is-active" (click)="closeMenu()">
      {{ 'nav.experience' | t }}
    </a>
    <a routerLink="/stack" routerLinkActive="is-active" (click)="closeMenu()">
      {{ 'nav.stack' | t }}
    </a>
    <a routerLink="/projects" routerLinkActive="is-active" (click)="closeMenu()">
      {{ 'nav.projects' | t }}
    </a>
    <a routerLink="/software" routerLinkActive="is-active" (click)="closeMenu()">
      {{ 'nav.software' | t }}
    </a>
    <a routerLink="/for-companies" routerLinkActive="is-active" (click)="closeMenu()">
      {{ 'nav.value' | t }}
    </a>
    <a routerLink="/daily" routerLinkActive="is-active" (click)="closeMenu()">
      {{ 'nav.blog' | t }}
    </a>
    <app-language-switcher class="shell__lang-mobile" />
  </nav>

  <app-language-switcher class="shell__lang-desktop" />
</header>

<main class="shell__main">
  <router-outlet />
</main>

<footer class="shell__footer">
  <p>© {{ year }} Christian Cruz Arango</p>
</footer>
